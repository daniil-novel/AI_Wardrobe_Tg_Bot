services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_wardrobe}
      POSTGRES_USER: ${POSTGRES_USER:-ai_wardrobe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_wardrobe}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: .
    env_file: .env
    command: uvicorn aiwardrobe_api.main:create_app --factory --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    command: celery -A aiwardrobe_worker.celery_app:celery_app worker --loglevel=INFO
    volumes:
      - .:/app
    depends_on:
      - api
      - redis

  bot:
    build: .
    env_file: .env
    command: python -m aiwardrobe_bot.main
    volumes:
      - .:/app
    depends_on:
      - api
      - redis

  miniapp:
    image: node:22-alpine
    working_dir: /app/apps/miniapp
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - .:/app

volumes:
  postgres_data:
  minio_data:
